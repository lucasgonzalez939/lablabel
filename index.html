<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEA Lab | MX08 Mobile</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; }
        button { cursor: pointer; background: var(--primary); color: white; border: none; font-weight: 600; flex-grow: 1; }
        button:active { opacity: 0.7; }
        button:disabled { background: #94a3b8; }
        #preview { background: white; border: 1px solid #000; display: block; margin: 10px auto; image-rendering: pixelated; width: 100%; max-width: 384px; height: auto; }
        .emoji-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; background: #f1f5f9; padding: 10px; border-radius: 8px; display: none; }
        .emoji-btn { background: white; border: 1px solid #cbd5e1; font-size: 1.4rem; padding: 5px; }
        .status { font-size: 0.8rem; text-align: center; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0">🏷️ NEA Lab Manager</h2>
    <div class="controls">
        <button id="btnConnect">🔗 Connect Printer</button>
        <div id="status" class="status">Status: Disconnected</div>
        
        <div class="row">
            <label style="font-weight:600">Label Size:</label>
            <select id="sizeSelector" onchange="updateCanvasSize()" style="flex-grow:1">
                <option value="384,120">Gapped (50x15mm)</option>
                <option value="384,240">Gapped (50x30mm)</option>
                <option value="384,180">Continuous (Manual)</option>
            </select>
        </div>

        <div class="row">
            <input type="text" id="textInput" placeholder="Text (e.g. Box #001)" style="flex-grow: 1;">
            <button type="button" onclick="toggleEmoji()" style="background:#64748b; flex-grow:0">😊</button>
        </div>

        <div id="emojiPicker" class="emoji-picker">
            <button class="emoji-btn" onclick="addEmoji('⚠️')">⚠️</button>
            <button class="emoji-btn" onclick="addEmoji('🧪')">🧪</button>
            <button class="emoji-btn" onclick="addEmoji('⚙️')">⚙️</button>
            <button class="emoji-btn" onclick="addEmoji('🔋')">🔋</button>
            <button class="emoji-btn" onclick="addEmoji('📦')">📦</button>
            <button class="emoji-btn" onclick="addEmoji('✅')">✅</button>
        </div>

        <div class="row">
            <label>Quantity:</label>
            <input type="number" id="serialCount" value="1" min="1" style="width: 70px;">
            <button id="btnPrint" disabled style="background:#059669">🚀 PRINT</button>
        </div>
    </div>
</div>

<canvas id="preview" width="384" height="120"></canvas>

<script>
    const PRINTER_SERVICE = '0000ffb0-0000-1000-8000-00805f9b34fb';
    const PRINTER_CHAR = '0000ffb2-0000-1000-8000-00805f9b34fb';
    let printerChar = null;

    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    function updateCanvasSize() {
        const [w, h] = document.getElementById('sizeSelector').value.split(',');
        canvas.width = parseInt(w);
        canvas.height = parseInt(h);
        renderLabel(textInput.value || "NEA #001");
    }

    document.getElementById('btnConnect').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'MX' }, { namePrefix: 'GB' }],
                optionalServices: [PRINTER_SERVICE]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(PRINTER_SERVICE);
            printerChar = await service.getCharacteristic(PRINTER_CHAR);
            document.getElementById('status').innerText = "Connected to " + device.name;
            document.getElementById('btnPrint').disabled = false;
        } catch (err) {
            document.getElementById('status').innerText = "Error: " + err.message;
        }
    };

    function renderLabel(text) {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "black";
        const fontSize = Math.floor(canvas.height * 0.6);
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
    }

    function getPrinterBytes() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        let bytes = [];
        const xL = (canvas.width / 8) & 0xFF;
        const xH = ((canvas.width / 8) >> 8) & 0xFF;
        const yL = canvas.height & 0xFF;
        const yH = (canvas.height >> 8) & 0xFF;
        const header = new Uint8Array([0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH]);
        
        let bitBuffer = 0;
        let bitCount = 0;
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i+1] + data[i+2]) / 3;
            const bit = avg < 128 ? 1 : 0;
            bitBuffer = (bitBuffer << 1) | bit;
            bitCount++;
            if (bitCount === 8) {
                bytes.push(bitBuffer);
                bitBuffer = 0;
                bitCount = 0;
            }
        }
        return new Uint8Array([...header, ...bytes]);
    }

    document.getElementById('btnPrint').onclick = async () => {
        const count = parseInt(document.getElementById('serialCount').value);
        const baseText = textInput.value;
        const isGapped = document.getElementById('sizeSelector').value !== "384,180";

        for (let i = 0; i < count; i++) {
            let currentText = baseText;
            if (baseText.includes('#')) {
                currentText = baseText.replace(/#(\d+)/, (m, p1) => (parseInt(p1) + i).toString().padStart(p1.length, '0'));
            }

            renderLabel(currentText);
            const data = getPrinterBytes();
            
            // Mobile Optimization: 20-byte chunks
            const CHUNK = 20; 
            for (let j = 0; j < data.length; j += CHUNK) {
                await printerChar.writeValueWithResponse(data.slice(j, j + CHUNK));
            }

            // End of Label Command
            const endCmd = isGapped ? [0x1D, 0x0C] : [0x1D, 0x56, 0x42, 0x00]; 
            await printerChar.writeValueWithResponse(new Uint8Array(endCmd));
            
            await new Promise(r => setTimeout(r, 1200)); 
        }
    };

    function toggleEmoji() {
        const p = document.getElementById('emojiPicker');
        p.style.display = p.style.display === 'grid' ? 'none' : 'grid';
    }
    function addEmoji(e) {
        textInput.value += e;
        renderLabel(textInput.value);
    }
    textInput.oninput = () => renderLabel(textInput.value);
    updateCanvasSize();
</script>
</body>
</html>
